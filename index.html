<!DOCTYPE html>
<html lang="en">

<head>
  <title>College Registration</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Sri Aditya Degree College</h1>

<form onsubmit="sendToWhatsApp(); return false;">

<label>Student Name</label>
<input type="text" id="name" placeholder="Enter your name" required>

<label>Mobile Number</label>
<input type="tel" id="mobile" placeholder="Enter mobile number" required>

<label>Select Course</label>
<select id="course" required>
<option value="">-- Select Course --</option>
<option>BCA (Data Science)</option>
<option>BSc (Data Science)</option>
<option>BCA (General)</option>
<option>BCom</option>
<option>BBA</option>
<option>BBA (Digital Marketing)</option>
<option>Bsc Computers</option>
<option>Bsc AIR (Artificial Intelligence and Robotics)</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

<script>
function sendToWhatsApp(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let course = document.getElementById("course").value;

let message =
"New Student Registration\n\n" +
"Name: " + name + "\n" +
"Mobile: " + mobile + "\n" +
"Course: " + course;

let phone = "917670888674";   // replace with your number

let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

window.open(url, "_blank");

}
</script>

</body>

</html>
